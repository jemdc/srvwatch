# SRVWatch — Nginx reverse proxy configuration
# Place at: /etc/nginx/sites-available/srvwatch
# Then: sudo ln -s /etc/nginx/sites-available/srvwatch /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;   # Replace with your domain or IP

    # Redirect HTTP → HTTPS if you have a cert
    # return 301 https://$host$request_uri;

    # Proxy all requests to the central FastAPI server
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Optional: serve frontend static files directly via Nginx (faster)
    # location / {
    #     root /opt/srvwatch/frontend;
    #     try_files $uri $uri/ /index.html;
    # }
    # location /api/ {
    #     proxy_pass http://127.0.0.1:8000;
    #     ...
    # }
}

