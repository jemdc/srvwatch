version: "3.9"

# SRVWatch Central — spins up TimescaleDB, Redis, and the central API server.
# Copy .env.example → .env and edit before running: docker compose up -d

services:

  # ── TimescaleDB (PostgreSQL + time-series extension) ──────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: srvwatch-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       srvwatch
      POSTGRES_USER:     srvwatch
      POSTGRES_PASSWORD: srvwatch
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U srvwatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: srvwatch-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── SRVWatch Central API + frontend ───────────────────────────────────────
  central:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: srvwatch-central
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://srvwatch:srvwatch@timescaledb:5432/srvwatch
      REDIS_URL:    redis://redis:6379/0
    ports:
      - "${CENTRAL_PORT:-8000}:8000"
    volumes:
      # Mount servers.yaml so you can edit it without rebuilding
      - ./servers.yaml:/app/servers.yaml:ro
      # Mount frontend so you can update it without rebuilding
      - ../frontend:/app/../frontend:ro
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  tsdb_data:
