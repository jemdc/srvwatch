# SRVWatch — monitored servers list
# Add one entry per Ubuntu machine running the srvwatch-agent.
#
# Fields:
#   id      — unique machine identifier (used in API URLs, no spaces)
#   label   — human-readable display name
#   host    — IP address or hostname reachable from this central server
#   port    — agent port (default 9100)
#   secret  — must match SRVWATCH_SECRET set on the agent (omit or leave blank to disable auth)

servers:
  - id: agent-alpha
    label: "AgentAlpha"
    host: 100.98.192.111
    port: 9100
    secret: "alphastrike"
